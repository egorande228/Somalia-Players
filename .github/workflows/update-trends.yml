name: Update trending data from Stake

on:
  schedule:
    - cron: "0 */18 * * *"   # каждые 18 часов
  workflow_dispatch:          # ручной запуск

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Xvfb + Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      - name: Install Python deps
        run: pip install -r requirements.txt xvfbwrapper

      - name: Parse melbet
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          xvfb-run --auto-servernum python parse_melbet.py --xvfb --proxy "$PROXY" -o result.json

      - name: Update site-data.js
        run: python update_site_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/site-data.js images/ result.json
          git diff --quiet --cached && echo "No changes" && exit 0
          git commit -m "Update trending games & sports from Melbet"
          git push

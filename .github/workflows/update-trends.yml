name: Update trending data from Stake

on:
  schedule:
    - cron: "5/5 * * * *"   # каждые 6 часов
  workflow_dispatch:          # ручной запуск

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Xvfb + Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      - name: Install Python deps
        run: pip install DrissionPage xvfbwrapper

      - name: Parse stake.com
        run: |
          xvfb-run --auto-servernum python parse_stake.py --xvfb -o result.json

      - name: Update site-data.js
        run: python update_site_data.py

      - name: Commit and push if changed
        run: |
          cd Somalia-Players
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet js/site-data.js && echo "No changes" && exit 0
          git add js/site-data.js
          git commit -m "Update trending games & sports from Stake"
          git push
